<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyer Match Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f1923;--sand:#f5f0e8;--cream:#faf8f4;--ocean:#1a5276;--ocean-light:#2471a3;--gold:#b7950b;--mist:#d5d8dc;--match-high:#1e8449;--match-med:#2471a3;--match-low:#7d6608}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
header{background:var(--ocean);color:white;padding:18px 36px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-family:'DM Serif Display',serif;font-size:1.7rem;letter-spacing:-0.02em}
header p{font-size:0.75rem;opacity:0.6;letter-spacing:0.06em;text-transform:uppercase;margin-top:3px}
.sync-pill{font-size:0.74rem;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.1);padding:6px 13px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.2);white-space:nowrap}
.sync-pill:hover{background:rgba(255,255,255,0.18)}
.dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background 0.3s}
.dot.loading{background:#f0ad4e;animation:pulse 1s infinite}
.dot.ok{background:#5cb85c}
.dot.error{background:#d9534f}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.layout{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 72px)}
.panel{background:var(--sand);border-right:1px solid var(--mist);padding:22px 20px;position:sticky;top:0;height:calc(100vh - 72px);overflow-y:auto}
.panel h2{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--ocean);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--mist)}
.fg{margin-bottom:15px}
label{display:block;font-size:0.67rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#666;margin-bottom:5px}
input,select{width:100%;padding:8px 10px;border:1.5px solid var(--mist);border-radius:6px;font-family:'DM Mono',monospace;font-size:0.82rem;background:white;color:var(--ink);outline:none;transition:border-color 0.15s}
input:focus,select:focus{border-color:var(--ocean-light);box-shadow:0 0 0 3px rgba(36,113,163,0.1)}
.hint{font-size:0.68rem;color:#aaa;margin-top:4px}
.btn-search{width:100%;padding:10px;background:var(--ocean);color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;margin-top:4px;transition:background 0.15s}
.btn-search:hover{background:var(--ocean-light)}
.btn-search:disabled{background:#999;cursor:not-allowed}
.btn-reset{width:100%;padding:7px;background:transparent;color:#999;border:1.5px solid var(--mist);border-radius:7px;font-size:0.78rem;cursor:pointer;margin-top:7px;transition:all 0.15s}
.btn-reset:hover{border-color:#aaa;color:#444}
.buyer-count{font-size:0.71rem;color:#999;text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--mist)}
.buyer-count strong{color:var(--ocean)}
.results{padding:26px 30px;overflow-y:auto}
.results-header{display:flex;align-items:baseline;gap:12px;margin-bottom:18px}
.results-header h2{font-family:'DM Serif Display',serif;font-size:1.15rem}
.count-badge{background:var(--ocean);color:white;font-family:'DM Mono',monospace;font-size:0.71rem;padding:2px 9px;border-radius:20px}
.empty-state{text-align:center;padding:60px 20px;color:#bbb}
.empty-state .icon{font-size:2.6rem;margin-bottom:12px}
.empty-state p{font-size:0.86rem;line-height:1.6}
.loading-bar{height:3px;background:linear-gradient(90deg,var(--ocean),var(--gold),var(--ocean));background-size:200%;animation:shimmer 1.2s infinite;border-radius:2px;margin-bottom:18px;display:none}
.loading-bar.active{display:block}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.error-box{background:#fdf2f2;border:1px solid #f5c6c6;border-radius:8px;padding:14px 16px;color:#8b1a1a;font-size:0.82rem;line-height:1.6;display:none;margin-bottom:16px}
.error-box.active{display:block}
.card{background:white;border-radius:10px;border:1.5px solid var(--mist);padding:15px 17px;margin-bottom:11px;display:grid;grid-template-columns:auto 1fr auto;gap:13px;align-items:start;transition:box-shadow 0.15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07);border-color:#bcc}
.score-wrap{display:flex;flex-direction:column;align-items:center;min-width:48px}
.score-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.8rem;font-weight:500;margin-bottom:4px}
.s-high{background:#d5f5e3;color:var(--match-high);border:2px solid #a9dfbf}
.s-med{background:#d6eaf8;color:var(--match-med);border:2px solid #a9cce3}
.s-low{background:#fef9e7;color:var(--match-low);border:2px solid #f9e79f}
.score-lbl{font-size:0.57rem;text-transform:uppercase;letter-spacing:0.06em;color:#aaa}
.card-name{font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:4px}
.card-contact{font-family:'DM Mono',monospace;font-size:0.71rem;color:#666;margin-bottom:7px;line-height:1.7}
.card-contact a{color:var(--ocean-light);text-decoration:none}
.card-contact a:hover{text-decoration:underline}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:0.64rem;padding:2px 7px;border-radius:20px;font-weight:500}
.t-info{background:#eaf0fb;color:var(--ocean)}
.t-status{background:#fdfefe;color:#555;border:1px solid var(--mist)}
.t-source{background:#fef9e7;color:var(--gold)}
.card-notes{font-size:0.71rem;color:#888;font-style:italic;line-height:1.5;margin-top:5px;border-top:1px solid #f0f0f0;padding-top:5px}
.reasons{display:flex;flex-direction:column;gap:4px;min-width:118px}
.reason{font-size:0.64rem;display:flex;align-items:center;gap:5px;color:#666}
.reason .d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dg{background:var(--match-high)}.db{background:var(--match-med)}.dy{background:var(--gold)}
</style>
</head>
<body>
<header>
  <div>
    <h1>Buyer Match Tool</h1>
    <p>Delray South Shore &mdash; Prospective Buyer Database</p>
  </div>
  <div class="sync-pill" onclick="loadBuyers(true)">
    <span class="dot loading" id="syncDot"></span>
    <span id="syncLabel">Loading data...</span>
  </div>
</header>
<div class="layout">
  <aside class="panel">
    <h2>Enter New Listing</h2>
    <div class="fg"><label>Resort</label>
      <select id="resort">
        <option value="">-- Any --</option>
        <option value="BOO">BOO</option>
        <option value="BBS">BBS</option>
        <option value="BBD">BBD</option>
        <option value="FLB">FLB</option>
        <option value="LBC">LBC</option>
        <option value="SDS">SDS</option>
        <option value="DOVER">Dover House</option>
      </select>
    </div>
    <div class="fg"><label>Week Number</label>
      <input type="number" id="week" placeholder="e.g. 6" min="1" max="52">
      <p class="hint">Single week number (1-52)</p>
    </div>
    <div class="fg"><label>Unit Number</label>
      <input type="text" id="unit" placeholder="e.g. 15, 24">
    </div>
    <div class="fg"><label>Month</label>
      <select id="month">
        <option value="">-- Any --</option>
        <option value="jan">January</option>
        <option value="feb">February</option>
        <option value="mar">March</option>
        <option value="apr">April</option>
        <option value="may">May</option>
        <option value="jun">June</option>
        <option value="jul">July</option>
        <option value="aug">August</option>
        <option value="sep">September</option>
        <option value="oct">October</option>
        <option value="nov">November</option>
        <option value="dec">December</option>
      </select>
    </div>
    <div class="fg"><label>Asking Price ($)</label>
      <input type="number" id="price" placeholder="e.g. 4500">
    </div>
    <div class="fg"><label>Floor</label>
      <select id="floor">
        <option value="">-- Any --</option>
        <option value="1st">1st Floor</option>
        <option value="2nd">2nd Floor</option>
      </select>
    </div>
    <button class="btn-search" id="searchBtn" onclick="runMatch()" disabled>Find Matching Buyers</button>
    <button class="btn-reset" onclick="resetForm()">Clear</button>
    <div class="buyer-count" id="buyerCount"></div>
  </aside>
  <main class="results" id="resultsPanel">
    <div class="loading-bar active" id="loadingBar"></div>
    <div class="error-box" id="errorBox"></div>
    <div class="empty-state">
      <div class="icon">&#9203;</div>
      <p>Loading buyer data from Google Sheets...</p>
    </div>
  </main>
</div>
<script>
var BUYERS = [];

// Google Sheets gviz endpoint - no CORS issues, works from any domain
var SHEET_ID = '1M77NnDqqJrrtxEbUDynJb7ecjNSKZOrsO8AndwPufZ8';
var GID = '404316292';

function getSheetUrl(bust) {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&gid=' + GID;
  if (bust) url += '&t=' + Date.now();
  return url;
}

async function loadBuyers(forceRefresh) {
  setSyncState('loading', 'Syncing...');
  setLoadingBar(true);
  hideError();

  try {
    var url = getSheetUrl(forceRefresh);
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var csv = await resp.text();
    if (!csv || csv.trim().length === 0) throw new Error('Empty response from sheet');
    BUYERS = parseCSV(csv);
    if (BUYERS.length === 0) throw new Error('No buyer rows found - check sheet column headers');

    var now = new Date();
    var t = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    setSyncState('ok', BUYERS.length + ' buyers - ' + t);
    document.getElementById('buyerCount').innerHTML = '<strong>' + BUYERS.length + '</strong> buyers loaded';
    document.getElementById('searchBtn').disabled = false;
    setLoadingBar(false);
    setEmptyState('Enter listing details on the left to find matched buyers.');
    hideError();
  } catch(err) {
    setSyncState('error', 'Failed - click to retry');
    setLoadingBar(false);
    showError('Could not load Google Sheet.<br><b>Error:</b> ' + err.message + '<br><br>Check that the sheet is shared as "Anyone with the link can view" and published to web as CSV.');
    console.error(err);
  }
}

function parseCSV(csv) {
  var lines = csv.split('\n').filter(function(l){ return l.trim(); });
  if (lines.length < 2) return [];
  var headers = parseRow(lines[0]);
  var buyers = [];
  for (var i = 1; i < lines.length; i++) {
    var vals = parseRow(lines[i]);
    if (vals.every(function(v){ return !v.trim(); })) continue;
    var row = {};
    headers.forEach(function(h,idx){ row[h] = (vals[idx]||'').trim(); });
    var fname = row['First Name'] || '';
    var lname = row['Last Name'] || '';
    var name = (fname + ' ' + lname).trim();
    var email = row['Email'] || '';
    var phone = row['Phone'] || '';
    if (!name && !email && !phone) continue;
    buyers.push({
      name:     name || '(No name)',
      email:    email,
      phone:    phone,
      month:    row['Month Desired'] || '',
      unit:     row['Unit'] || '',
      week:     row['Week'] || '',
      price:    row['Price'] || '',
      location: row['Resort/Location'] || '',
      source:   row['Source'] || '',
      status:   row['Status'] || '',
      comments: row['Comments'] || '',
      notes:    row['Follow-Up Notes'] || ''
    });
  }
  return buyers;
}

function parseRow(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else { cur += c; }
  }
  result.push(cur);
  return result;
}

var MONTHS = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,
  january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};

function monthNums(str) {
  if (!str) return [];
  var s = str.toLowerCase(), out = [];
  for (var k in MONTHS) { if (s.indexOf(k) > -1) out.push(MONTHS[k]); }
  return out;
}

function weekNums(str) {
  if (!str) return [];
  var s = str.toLowerCase(), out = [];
  var m = s.match(/(\d+)\s*(?:thru|to|-)\s*(\d+)/);
  if (m) { for (var i=parseInt(m[1]); i<=Math.min(parseInt(m[2]),52); i++) out.push(i); }
  var singles = s.match(/\b(\d{1,2})\b/g);
  if (singles) singles.forEach(function(n){ var v=parseInt(n); if(v>=1&&v<=52) out.push(v); });
  return out.filter(function(v,i,a){ return a.indexOf(v)===i; });
}

function scoreBuyer(b, q) {
  var score = 0, reasons = [];
  var qWeek = q.week ? parseInt(q.week) : null;
  var qUnit = q.unit ? q.unit.trim().toLowerCase() : '';
  var qMon  = q.month ? MONTHS[q.month] : null;
  var qResort = q.resort || '';
  var qFloor  = q.floor  || '';

  if (qWeek) {
    if (weekNums(b.week).indexOf(qWeek) > -1) {
      score += 40; reasons.push({d:'dg', t:'Week ' + qWeek + ' match'});
    }
  }
  if (qResort) {
    var allText = [b.location, b.comments, b.status, b.source].join(' ').toUpperCase();
    if (allText.indexOf(qResort.toUpperCase()) > -1) {
      score += 30; reasons.push({d:'dg', t:'Resort: ' + qResort});
    }
  }
  if (qMon) {
    var bMons = monthNums([b.month, b.week, b.comments].join(' '));
    if (bMons.indexOf(qMon) > -1) {
      score += 20; reasons.push({d:'db', t:'Month match'});
    }
  }
  if (qUnit) {
    var qUnitNum = parseInt(qUnit);
    if (!isNaN(qUnitNum)) {
      var bUnitNums = weekNums(b.unit + ' ' + b.location);
      if (bUnitNums.indexOf(qUnitNum) > -1) {
        score += 15; reasons.push({d:'db', t:'Unit ' + qUnitNum});
      }
    }
    if ([b.unit, b.location, b.comments].join(' ').toLowerCase().indexOf('any') > -1) {
      score += 5; reasons.push({d:'db', t:'Flexible on unit'});
    }
  }
  if (qFloor) {
    var ft = [b.unit, b.location, b.comments, b.status].join(' ').toLowerCase();
    if (qFloor === '1st' && (ft.indexOf('1st') > -1 || ft.indexOf('ground') > -1)) {
      score += 8; reasons.push({d:'dy', t:'1st floor'});
    }
    if (qFloor === '2nd' && (ft.indexOf('2nd') > -1 || ft.indexOf('upstairs') > -1)) {
      score += 8; reasons.push({d:'dy', t:'2nd floor'});
    }
  }
  return {score: score, reasons: reasons};
}

function runMatch() {
  var q = {
    resort: document.getElementById('resort').value,
    week:   document.getElementById('week').value,
    unit:   document.getElementById('unit').value,
    month:  document.getElementById('month').value,
    price:  document.getElementById('price').value,
    floor:  document.getElementById('floor').value
  };
  if (!q.resort && !q.week && !q.unit && !q.month && !q.floor) {
    alert('Enter at least one search criteria.'); return;
  }
  var results = BUYERS.map(function(b) {
    var s = scoreBuyer(b, q);
    return {buyer: b, score: s.score, reasons: s.reasons};
  }).filter(function(r){ return r.score > 0; })
    .sort(function(a,b){ return b.score - a.score; });
  renderResults(results);
}

function renderResults(results) {
  var panel = document.getElementById('resultsPanel');
  hideError();
  if (results.length === 0) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">&#128269;</div><p>No buyers matched.<br>Try broader criteria.</p></div>';
    return;
  }
  var maxScore = results[0].score;
  var html = '<div class="results-header"><h2>Matched Buyers</h2><span class="count-badge">' + results.length + ' found</span></div>';
  results.forEach(function(r) {
    var b = r.buyer;
    var pct = Math.round((r.score / Math.max(maxScore,1)) * 100);
    var tier = pct >= 70 ? 's-high' : pct >= 40 ? 's-med' : 's-low';
    var lbl  = pct >= 70 ? 'Strong'  : pct >= 40 ? 'Good'   : 'Partial';
    var emailHtml = b.email
      ? b.email.split(/[;,]/).map(function(e){ return '<a href="mailto:' + e.trim() + '">' + e.trim() + '</a>'; }).join('<br>')
      : '<span style="color:#ccc">No email</span>';
    var tagsHtml = [
      b.source  ? '<span class="tag t-source">' + b.source + '</span>' : '',
      b.status && b.status.length < 50 ? '<span class="tag t-status">' + b.status + '</span>' : '',
      b.week    ? '<span class="tag t-info">Wk: ' + b.week + '</span>' : '',
      b.month   ? '<span class="tag t-info">' + b.month + '</span>' : '',
      b.unit && b.unit.length < 25 ? '<span class="tag t-info">Unit: ' + b.unit + '</span>' : ''
    ].filter(Boolean).join('');
    var notesText = [b.comments, b.notes].filter(Boolean).join(' - ');
    var notesHtml = notesText ? '<div class="card-notes">' + notesText.substring(0,220) + (notesText.length > 220 ? '...' : '') + '</div>' : '';
    var reasonsHtml = r.reasons.map(function(rr){ return '<div class="reason"><span class="d ' + rr.d + '"></span>' + rr.t + '</div>'; }).join('');
    html += '<div class="card">'
      + '<div class="score-wrap"><div class="score-ring ' + tier + '">' + pct + '%</div><div class="score-lbl">' + lbl + '</div></div>'
      + '<div>'
        + '<div class="card-name">' + b.name + '</div>'
        + '<div class="card-contact">&#128231; ' + emailHtml + '<br>&#128222; ' + (b.phone || '<span style="color:#ccc">No phone</span>') + '</div>'
        + '<div class="tags">' + tagsHtml + '</div>'
        + notesHtml
      + '</div>'
      + '<div class="reasons">' + reasonsHtml + '</div>'
      + '</div>';
  });
  panel.innerHTML = html;
}

function resetForm() {
  ['resort','week','unit','month','price','floor'].forEach(function(id){ document.getElementById(id).value=''; });
  setEmptyState('Enter listing details on the left to find matched buyers.');
}

function setSyncState(state, label) {
  document.getElementById('syncDot').className = 'dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}
function setLoadingBar(on) {
  var el = document.getElementById('loadingBar');
  if (el) el.className = 'loading-bar' + (on ? ' active' : '');
}
function showError(msg) {
  var el = document.getElementById('errorBox');
  if (el) { el.innerHTML = msg; el.className = 'error-box active'; }
}
function hideError() {
  var el = document.getElementById('errorBox');
  if (el) el.className = 'error-box';
}
function setEmptyState(msg) {
  document.getElementById('resultsPanel').innerHTML =
    '<div class="loading-bar" id="loadingBar"></div>'
    + '<div class="error-box" id="errorBox"></div>'
    + '<div class="empty-state"><div class="icon">&#127958;</div><p>' + msg + '</p></div>';
}

loadBuyers(false);
setInterval(function(){ loadBuyers(false); }, 10 * 60 * 1000);
</script>
</body>
</html>
